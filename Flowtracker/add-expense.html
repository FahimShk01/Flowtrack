<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Expense – Trackflow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .form-card {
        max-width: 640px;
        margin: 0 auto;
        padding: 36px;
      }
      /* Plain wrapper — avoids position:relative + floating-label from style.css */
      .cat-section {
        margin-bottom: 20px;
      }
      .cat-section-label {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .category-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 4px;
      }
      .cat-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 14px 6px;
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.04);
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: var(--transition);
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--text-primary);
        text-align: center;
        line-height: 1.3;
        word-break: break-word;
      }
      .cat-btn:hover {
        background: rgba(108, 99, 255, 0.1);
        border-color: rgba(108, 99, 255, 0.4);
        color: var(--text-primary);
      }
      .cat-btn.selected {
        background: rgba(108, 99, 255, 0.15);
        border-color: var(--accent-1);
        color: #a89bff;
      }
      .cat-btn .cat-emoji {
        font-size: 1.4rem;
      }

      .amount-input-wrap {
        position: relative;
      }
      .amount-prefix {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-secondary);
        pointer-events: none;
      }
      .amount-input {
        padding-left: 36px !important;
        font-size: 1.6rem !important;
        font-weight: 700 !important;
        font-family: "Space Grotesk", sans-serif !important;
      }

      .type-toggle {
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: var(--radius-full);
        padding: 4px;
        margin-bottom: 24px;
      }
      .type-btn {
        flex: 1;
        padding: 10px;
        text-align: center;
        border-radius: var(--radius-full);
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        color: var(--text-muted);
        border: none;
        background: none;
      }
      .type-btn.active.expense {
        background: var(--gradient-danger);
        color: #fff;
      }
      .type-btn.active.income {
        background: var(--gradient-success);
        color: #0a0b14;
      }

      /* Success overlay */
      .success-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .success-amount {
        font-family: "Space Grotesk", sans-serif;
        font-size: 2rem;
        font-weight: 800;
      }
      .checkmark-svg {
        width: 80px;
        height: 80px;
      }
      .checkmark-circle {
        fill: none;
        stroke: #43e97b;
        stroke-width: 3;
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        animation: dash-circle 0.6s ease forwards 0.3s;
      }
      .checkmark-tick {
        fill: none;
        stroke: #43e97b;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 50;
        stroke-dashoffset: 50;
        animation: dash-tick 0.4s ease forwards 0.9s;
      }
      @keyframes dash-circle {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes dash-tick {
        to {
          stroke-dashoffset: 0;
        }
      }

      @media (max-width: 600px) {
        .category-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .form-card {
          padding: 24px 16px;
        }
      }
    </style>
    <link rel="prefetch" href="dashboard.html" />
    <link rel="prefetch" href="transactions.html" />
    <link rel="prefetch" href="add-expense.html" />
    <link rel="prefetch" href="budget.html" />
    <link rel="prefetch" href="savings.html" />
    <link rel="prefetch" href="analytics.html" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon"><i class="fa-solid fa-chart-pie"></i></div>
          <span class="brand-name">Trackflow</span>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-title">Main</div>
          <a href="dashboard.html" class="nav-item" data-page="dashboard.html">
            <span class="nav-icon"><i class="fa-solid fa-gauge-high"></i></span
            >Dashboard</a
          >
          <a
            href="add-expense.html"
            class="nav-item"
            data-page="add-expense.html"
          >
            <span class="nav-icon"><i class="fa-solid fa-plus-circle"></i></span
            >Add Expense</a
          >
          <a
            href="transactions.html"
            class="nav-item"
            data-page="transactions.html"
          >
            <span class="nav-icon"><i class="fa-solid fa-list-ul"></i></span
            >Transactions</a
          >
          <div class="nav-section-title">Planning</div>
          <a href="budget.html" class="nav-item" data-page="budget.html">
            <span class="nav-icon"><i class="fa-solid fa-wallet"></i></span
            >Budget Planner</a
          >
          <a href="savings.html" class="nav-item" data-page="savings.html">
            <span class="nav-icon"><i class="fa-solid fa-piggy-bank"></i></span
            >Savings Goals</a
          >
          <a href="analytics.html" class="nav-item" data-page="analytics.html">
            <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span
            >Analytics</a
          >
          <div class="nav-section-title">Account</div>
          <a href="login.html" class="nav-item"
            ><span class="nav-icon"
              ><i class="fa-solid fa-right-from-bracket"></i></span
            >Logout</a
          >
        </nav>
        <div class="sidebar-footer">
          <div class="user-avatar-sidebar">
            <div class="avatar-img" id="sb-user-init">RS</div>
            <div class="avatar-info">
              <div class="avatar-name" id="sb-user-name">Rahul Sharma</div>
              <div class="avatar-email" id="sb-user-email">
                rahul@example.com
              </div>
            </div>
          </div>
        </div>
      </aside>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <main class="main-content">
        <div class="top-bar">
          <div>
            <button class="menu-toggle" id="menu-toggle">
              <i class="fa-solid fa-bars"></i>
            </button>
            <h1
              class="page-title"
              style="display: inline-block; margin-left: 12px"
            >
              Add Expense
            </h1>
            <div class="page-subtitle">Log a new transaction</div>
          </div>
          <div class="top-actions">
            <a href="transactions.html" class="btn btn-outline btn-sm"
              ><i class="fa-solid fa-list"></i> View All</a
            >
          </div>
        </div>

        <div class="form-card glass-card" id="form-card">
          <!-- Type toggle -->
          <div class="type-toggle">
            <button
              class="type-btn active expense"
              id="type-expense"
              onclick="setType('expense')"
            >
              <i class="fa-solid fa-arrow-trend-up"></i> Expense
            </button>
            <button
              class="type-btn income"
              id="type-income"
              onclick="setType('income')"
            >
              <i class="fa-solid fa-arrow-trend-down"></i> Income
            </button>
          </div>

          <!-- Amount -->
          <div class="input-group">
            <label>Amount (₹)</label>
            <div class="amount-input-wrap">
              <span class="amount-prefix">₹</span>
              <input
                type="number"
                id="inp-amount"
                class="input-field amount-input"
                placeholder="0"
                min="1"
              />
            </div>
          </div>

          <!-- Category -->
          <div class="cat-section">
            <div class="cat-section-label">Category</div>
            <div class="category-grid" id="category-grid"></div>
            <input type="hidden" id="selected-cat" value="" />
          </div>

          <!-- Date -->
          <div class="input-group">
            <label for="inp-date">Date</label>
            <span class="input-icon"><i class="fa-solid fa-calendar"></i></span>
            <input type="date" id="inp-date" class="input-field has-icon" />
          </div>

          <!-- Notes -->
          <div class="input-group">
            <label for="inp-note">Notes</label>
            <span class="input-icon"
              ><i class="fa-solid fa-pen-to-square"></i
            ></span>
            <input
              type="text"
              id="inp-note"
              class="input-field has-icon"
              placeholder="What was this for?"
            />
          </div>

          <button
            class="btn btn-primary w-full"
            style="padding: 16px; font-size: 1rem"
            id="submit-btn"
            onclick="submitExpense()"
          >
            <i class="fa-solid fa-plus"></i> Add Transaction
          </button>
        </div>
      </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="bottom-nav-items">
        <a href="dashboard.html" class="bottom-nav-item"
          ><span class="icon"><i class="fa-solid fa-gauge-high"></i></span
          >Home</a
        >
        <a href="transactions.html" class="bottom-nav-item"
          ><span class="icon"><i class="fa-solid fa-list-ul"></i></span
          >History</a
        >
        <a href="add-expense.html" class="bottom-nav-add"
          ><i class="fa-solid fa-plus"></i
        ></a>
        <a href="budget.html" class="bottom-nav-item"
          ><span class="icon"><i class="fa-solid fa-wallet"></i></span>Budget</a
        >
        <a href="analytics.html" class="bottom-nav-item"
          ><span class="icon"><i class="fa-solid fa-chart-pie"></i></span
          >Analytics</a
        >
      </div>
    </nav>

    <!-- Success Overlay -->
    <div class="success-overlay" id="success-overlay">
      <div class="success-content">
        <svg class="checkmark-svg" viewBox="0 0 80 80">
          <circle class="checkmark-circle" cx="40" cy="40" r="36" />
          <polyline class="checkmark-tick" points="24,42 35,53 58,28" />
        </svg>
        <div style="text-align: center">
          <div class="success-text">Transaction Added!</div>
          <div class="success-amount" id="success-amount">₹0</div>
          <div class="success-sub" id="success-cat">Food & Dining · Today</div>
        </div>
        <button class="btn btn-primary" onclick="closeSuccess()">
          <i class="fa-solid fa-plus"></i> Add Another
        </button>
        <a href="dashboard.html" class="btn btn-outline">Go to Dashboard</a>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/app.js"></script>
    <script>
      // ── Module-level state (shared across setType / submitExpense / closeSuccess) ──
      // These must live OUTSIDE _initPage so the global functions below can close over them.
      var _currentType = "expense";
      var _expGrid = null; // reference to #category-grid DOM node
      var _expCats = null; // resolved category list

      // ── GLOBAL: onclick="setType(...)" handlers need window-level access ──
      function setType(t) {
        _currentType = t;
        var expBtn = document.getElementById("type-expense");
        var incBtn = document.getElementById("type-income");
        if (expBtn)
          expBtn.className =
            "type-btn" + (t === "expense" ? " active expense" : "");
        if (incBtn)
          incBtn.className =
            "type-btn" + (t === "income" ? " active income" : "");
        if (typeof gsap !== "undefined") {
          gsap.fromTo(
            ".type-btn.active",
            { scale: 0.95 },
            { scale: 1, duration: 0.3, ease: "back.out(2)" },
          );
        }
      }

      // ── GLOBAL: onclick="submitExpense()" ──
      function submitExpense() {
        // If the grid hasn't been initialised yet (e.g. router navigation in
        // progress), run _initPage first then bail — the user can tap again.
        if (!_expGrid) {
          _initPage();
          if (typeof showToast === "function")
            showToast("Almost ready — please try again", "info");
          return;
        }

        var amtEl = document.getElementById("inp-amount");
        var catEl = document.getElementById("selected-cat");
        var dateEl = document.getElementById("inp-date");
        var noteEl = document.getElementById("inp-note");

        var amount = parseFloat(amtEl ? amtEl.value : "");
        var cat = catEl ? catEl.value : "";
        var date = dateEl ? dateEl.value : "";
        var note =
          noteEl && noteEl.value.trim()
            ? noteEl.value.trim()
            : "No description";

        if (!amount || amount <= 0) {
          if (typeof showToast === "function")
            showToast("Please enter a valid amount", "error");
          if (typeof gsap !== "undefined")
            gsap.fromTo(
              "#inp-amount",
              { x: 0 },
              {
                x: 10,
                duration: 0.06,
                repeat: 5,
                yoyo: true,
                ease: "power2.inOut",
              },
            );
          return;
        }
        if (!cat) {
          if (typeof showToast === "function")
            showToast("Please select a category", "error");
          return;
        }
        if (!date) {
          if (typeof showToast === "function")
            showToast("Please select a date", "error");
          if (typeof gsap !== "undefined")
            gsap.fromTo(
              "#inp-date",
              { x: 0 },
              {
                x: 10,
                duration: 0.06,
                repeat: 5,
                yoyo: true,
                ease: "power2.inOut",
              },
            );
          return;
        }

        var txn = {
          id: Date.now(),
          date: date,
          category: cat,
          amount: amount,
          note: note,
          type: _currentType,
        };
        Trackflow.transactions.unshift(txn);
        saveTransactions();

        // Refresh all live UI widgets immediately — no reload needed
        if (typeof renderRecentTransactions === "function")
          renderRecentTransactions();
        if (typeof renderBudgetMini === "function") renderBudgetMini();
        if (typeof renderGoalsMini === "function") renderGoalsMini();

        var catMeta =
          typeof getCategoryMeta === "function"
            ? getCategoryMeta(cat)
            : (_expCats &&
                _expCats.find(function (c) {
                  return c.id === cat;
                })) || { label: cat, icon: "📦" };

        var saEl = document.getElementById("success-amount");
        var scEl = document.getElementById("success-cat");
        var soEl = document.getElementById("success-overlay");
        if (saEl) saEl.textContent = formatINR(amount);
        if (scEl) scEl.textContent = catMeta.label + " · " + formatDate(date);
        if (soEl) soEl.classList.add("active");
        if (typeof gsap !== "undefined")
          gsap.fromTo(
            ".success-content",
            { scale: 0.8, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.6)" },
          );
        if (typeof launchConfetti === "function") launchConfetti();
      }

      // ── GLOBAL: onclick="closeSuccess()" ──
      function closeSuccess() {
        if (typeof gsap !== "undefined") {
          gsap.to(".success-content", {
            scale: 0.9,
            opacity: 0,
            duration: 0.3,
            onComplete: _resetForm,
          });
        } else {
          _resetForm();
        }
      }

      function _resetForm() {
        var soEl = document.getElementById("success-overlay");
        if (soEl) soEl.classList.remove("active");
        var aEl = document.getElementById("inp-amount");
        if (aEl) aEl.value = "";
        var nEl = document.getElementById("inp-note");
        if (nEl) nEl.value = "";
        var dEl = document.getElementById("inp-date");
        if (dEl) {
          var now = new Date();
          var localDate =
            now.getFullYear() +
            "-" +
            String(now.getMonth() + 1).padStart(2, "0") +
            "-" +
            String(now.getDate()).padStart(2, "0");
          dEl.value = localDate;
        }
        setType("expense");
        if (_expGrid) {
          _expGrid.querySelectorAll(".cat-btn").forEach(function (b) {
            b.classList.remove("selected");
          });
          var first = _expGrid.querySelector(".cat-btn");
          if (first) first.click();
        }
      }

      // ── _initPage: builds the grid, attaches focus/amount listeners, sidebar ──
      function _initPage() {
        if (typeof initSidebar === "function") initSidebar();

        var dateEl = document.getElementById("inp-date");
        if (dateEl) {
          var now = new Date();
          dateEl.value =
            now.getFullYear() +
            "-" +
            String(now.getMonth() + 1).padStart(2, "0") +
            "-" +
            String(now.getDate()).padStart(2, "0");
        }

        // Reset type toggle to Expense on every page init
        setType("expense");

        // Category list — prefer Trackflow.categories, fall back to defaults
        var _fallbackCats = [
          { id: "food", icon: "🍔", label: "Food & Dining" },
          { id: "transport", icon: "🚗", label: "Transport" },
          { id: "shopping", icon: "🛍️", label: "Shopping" },
          { id: "health", icon: "💊", label: "Health" },
          { id: "bills", icon: "💡", label: "Bills & Utils" },
          { id: "entertainment", icon: "🎬", label: "Entertainment" },
          { id: "education", icon: "📚", label: "Education" },
          { id: "savings", icon: "🏦", label: "Savings" },
          { id: "other", icon: "📦", label: "Other" },
        ];
        _expCats =
          typeof Trackflow !== "undefined" &&
          Trackflow.categories &&
          Trackflow.categories.length
            ? Trackflow.categories
            : _fallbackCats;

        _expGrid = document.getElementById("category-grid");
        if (_expGrid) {
          _expGrid.innerHTML = ""; // clear before rebuild (handles router re-navigation)
          _expCats.forEach(function (cat) {
            var btn = document.createElement("div");
            btn.className = "cat-btn";
            btn.dataset.id = cat.id;
            btn.innerHTML =
              '<span class="cat-emoji">' +
              cat.icon +
              "</span><span>" +
              cat.label +
              "</span>";
            btn.addEventListener("click", function () {
              _expGrid.querySelectorAll(".cat-btn").forEach(function (b) {
                b.classList.remove("selected");
              });
              btn.classList.add("selected");
              var scEl = document.getElementById("selected-cat");
              if (scEl) scEl.value = cat.id;
              if (typeof gsap !== "undefined")
                gsap.fromTo(
                  btn,
                  { scale: 0.88 },
                  { scale: 1, duration: 0.4, ease: "back.out(2)" },
                );
            });
            _expGrid.appendChild(btn);
          });
          var firstBtn = _expGrid.querySelector(".cat-btn");
          if (firstBtn) firstBtn.click();
        }

        // Input glow on focus (skip hidden inputs)
        document
          .querySelectorAll(".input-field:not([type=hidden])")
          .forEach(function (inp) {
            inp.addEventListener("focus", function () {
              if (typeof gsap !== "undefined")
                gsap.to(inp, { scale: 1.005, duration: 0.2 });
            });
            inp.addEventListener("blur", function () {
              if (typeof gsap !== "undefined")
                gsap.to(inp, { scale: 1, duration: 0.2 });
            });
          });

        // Amount pulse on input
        var amtInp = document.getElementById("inp-amount");
        if (amtInp) {
          amtInp.addEventListener("input", function () {
            if (parseFloat(this.value) > 0 && typeof gsap !== "undefined") {
              gsap.fromTo(
                this,
                { borderColor: "var(--accent-1)" },
                { borderColor: "var(--border)", duration: 0.5, delay: 0.3 },
              );
            }
          });
        }

        // Entrance animation
        if (typeof gsap !== "undefined") {
          gsap.fromTo(
            ".form-card",
            { opacity: 0, y: 14 },
            { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
          );
        }
      }

      // Expose so the SPA router can call window.initAddExpensePage() on every navigation
      window.initAddExpensePage = _initPage;

      // Run after DOM is live — handles both normal load and router-injected navigation
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", _initPage);
      } else {
        requestAnimationFrame(_initPage);
      }
    </script>
    <script src="js/router.js"></script>
  </body>
</html>
